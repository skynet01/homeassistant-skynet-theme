          font-weight: 400 !important;
        }

  # animations
  card-mod-row-yaml: |
    ".": |
      div.wrapper ha-slider {
        margin-right: 14px;
      }
      {% if config is defined and config.entity is defined and (is_state(config.entity, 'off') or is_state(config.entity, 'closed')) %}
      ha-slider {
        --md-slider-handle-color: #2e3a4f !important;
        --md-slider-focused-handle-color: #2e3a4f !important;
        --md-slider-hover-handle-color: #2e3a4f !important;
        --md-slider-active-track-color: #0d4e70 !important;
        --md-slider-inactive-track-color: #0d4e70 !important;
      }
      {% endif %}
    "*:first-child$": |
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(359deg);
        }
      }
      state-badge {
        {% if config is defined and config.entity is defined and config.entity.startswith('fan.') and is_state(config.entity, 'on') %}
          animation: {% set perc = state_attr(config.entity, 'percentage')|int %}
                    {% set base = 'spin infinite linear' %}
                    {% if perc <= 33 %} 3.6s {{ base }};
                    {%- elif perc <= 66 %} 2.5s {{ base }};
                    {%- elif perc <= 99 %} 1.5s {{ base }};
                    {%- else %} 0.75s {{ base }};
                    {% endif %}
        {% endif %}
      }

